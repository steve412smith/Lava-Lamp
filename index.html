<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#061311" />
  <title>Lava Drift</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <main class="panel" id="panel">
    <header>
      <div>
        <h1>Lava Drift</h1>
        <p>procedural sensory lava lamp</p>
      </div>
      <button id="collapse" aria-label="Toggle controls">⌄</button>
    </header>

    <section class="presets" aria-label="Color presets">
      <button data-preset="forest" class="active">Forest</button>
      <button data-preset="ocean">Ocean</button>
      <button data-preset="ember">Ember</button>
      <button data-preset="aurora">Aurora</button>
      <button data-preset="night">Night</button>
    </section>

    <section class="controls">
      <label>Motion <input id="speed" type="range" min="0.15" max="2.5" step="0.01" value="0.72"></label>
      <label>Density <input id="density" type="range" min="60" max="420" step="1" value="210"></label>
      <label>Glow <input id="glow" type="range" min="0.2" max="2.2" step="0.01" value="1.25"></label>
      <label>Coherence <input id="coherence" type="range" min="0" max="1" step="0.01" value="0.55"></label>
    </section>

    <section class="actions">
      <button id="randomize">Randomize</button>
      <button id="pause">Pause</button>
      <button id="hide">Hide UI</button>
    </section>
  </main>

  <button class="show-ui" id="showUi">Controls</button>
  <script src="app.js"></script>
</body>
</html>
